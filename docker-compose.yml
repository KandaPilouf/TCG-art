services:
  web:
    build: .
    ports:
      - "80:80"                          # site at http://localhost (stop XAMPP Apache first)
    volumes:
      - .:/var/www/html                  # live code — edits show without rebuild
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tcg_card_art
    ports:
      - "3307:3306"                      # host access (VS Code, dumps); app uses 'db:3306' internally
    volumes:
      - dbdata:/var/lib/mysql
      - ./database/dump.sql:/docker-entrypoint-initdb.d/dump.sql

  phpmyadmin:
    image: phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  dbdata:
